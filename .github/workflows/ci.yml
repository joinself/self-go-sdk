name: CI

on:
  push:
    branches:
      - main
      - 'release-[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main
      - 'release-[0-9]+.[0-9]+'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.1-trixie
    timeout-minutes: 15
    steps:
      - uses: joinself/actions-public/setup-job@main
      - uses: actions/checkout@v6
      - name: Test
        run: |
          mkdir -m 0755 -p /etc/apt/keyrings
          curl -fsSL https://europe-apt.pkg.dev/doc/repo-signing-key.gpg | gpg --dearmor -o /etc/apt/keyrings/self.gpg
          echo "deb [signed-by=/etc/apt/keyrings/self.gpg] https://europe-apt.pkg.dev/projects/principal-oxide-204416 apt main" > /etc/apt/sources.list.d/self.list

          apt-get update && apt-get install -y self-sdk=0.85.0-55

          curl https://gotest-release.s3.amazonaws.com/gotest_linux > /usr/local/bin/gotest
          chmod +x /usr/local/bin/gotest

          cd account
          gotest -v

          echo "testing examples..."

          examples=(chat credentials/sharing credentials/authentication discovery)
          for e in ${examples[@]}; do
            cd ${GITHUB_WORKSPACE}/examples/${e} && go build -buildvcs=false .
          done

  publish:
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-') }}
    needs: test
    concurrency:
      group: publish
    permissions:
      contents: write
    uses: joinself/workflows-public/.github/workflows/publish.yml@main
    with:
      git-tag-prefix: v
    secrets: inherit
