name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  license-compliance:
    runs-on: ubuntu-latest
    container:
      image: joinself/license-finder:go
    steps:
      - uses: actions/checkout@v3
      - name: Setup environment
        run: |
          apt-get update
          apt-get -y install libsodium-dev
          curl -sSLo /tmp/olm.deb https://download.joinself.com/olm/libself-olm_0.1.17_amd64.deb
          curl -sSLo /tmp/omemo.deb https://download.joinself.com/omemo/libself-omemo_0.1.3_amd64.deb
          apt-get -y install /tmp/olm.deb /tmp/omemo.deb
      - name: License check
        run: |
          curl -Lo /tmp/dependency_decisions.yml https://static.joinself.com/license-finder/dependency_decisions.yml
          license_finder --decisions_file /tmp/dependency_decisions.yml
  secret-scan:
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:v8.16.2
      options: "--user root"
    steps:
      - uses: actions/checkout@v3
      - name: Secrets check
        run: |
          chown root:root .
          wget -O /tmp/gitleaks.toml https://static.joinself.com/gitleaks/gitleaks.toml
          gitleaks -c /tmp/gitleaks.toml detect
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.18.2
    steps:
      - uses: actions/checkout@v3
      - name: Setup environment
        run: |
          exit 1
          apt-get update
          apt-get -y install curl libsodium-dev
          curl https://download.joinself.com/olm/libself-olm_0.1.17_amd64.deb -o /tmp/libself-olm_0.1.17_amd64.deb
          curl https://download.joinself.com/omemo/libself-omemo_0.1.3_amd64.deb -o /tmp/libself-omemo_0.1.3_amd64.deb
          apt-get -y install /tmp/libself-olm_0.1.17_amd64.deb
          apt-get -y install /tmp/libself-omemo_0.1.3_amd64.deb
      - name: Test package
        run: go test -v ./...
